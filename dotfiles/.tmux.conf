# VI
set-option -g mouse on
setw -g mode-keys vi
set -g mode-keys vi

bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-selection      # stays in copy mode
bind-key -T copy-mode-vi Y send -X copy-pipe "wl-copy" # or xclip/pbcopy etc.

bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe "xsel --clipboard -i"
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Window movement
bind -r h select-pane -L
bind -r l select-pane -R
bind -r j select-pane -D
bind -r k select-pane -U

# Layout
bind H set-window-option main-pane-height 80\% \; select-layout main-horizontal
bind V set-window-option main-pane-width 50\% \; select-layout main-vertical
bind T select-layout tiled

# Resize pane
bind -r C-h resize-pane -L
bind -r C-l resize-pane -R
bind -r C-j resize-pane -D
bind -r C-k resize-pane -U

bind -r < swap-window -t -1 \; select-window -t -1
bind -r > swap-window -t +1 \; select-window -t +1

# Reload tmux config
bind r source-file ~/.tmux.conf \; display-message "Config reloaded..."

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'niksingh710/minimal-tmux-status'

run '~/.tmux/plugins/tpm/tpm'

